[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests requiring live API access",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N"]
# E501 – line too long (handled by formatter)
# E402 – module-level import not at top (intentional: sys.path set-up before imports)
# N803/N806 – argument/variable should be lowercase (ML convention: X for feature matrices)
ignore = ["E501", "E402", "N803", "N806"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
